<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Semester Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --panel: #FAFAFA;
    --line: #E5E7EB;
    --line-soft: #F1F3F5;
    --ink: #111827;
    --ink-soft: #4B5563;
    --muted: #9CA3AF;
    --accent: #B85C00;
    --link: #2563EB;
    --link-hover: #1D4ED8;

    --type-reading-bg: #C7D2FE;     --type-reading-fg: #3730A3;
    --type-video-bg: #BAE6FD;       --type-video-fg: #0369A1;
    --type-lecture-bg: #FDE68A;     --type-lecture-fg: #92400E;
    --type-discussion-bg: #BBF7D0;  --type-discussion-fg: #166534;
    --type-paper-bg: #FED7AA;       --type-paper-fg: #9A3412;
    --type-assignment-bg: #BBF7D0;  --type-assignment-fg: #166534;
    --type-quiz-bg: #DDD6FE;        --type-quiz-fg: #5B21B6;
    --type-exam-bg: #FBCFE8;        --type-exam-fg: #9D174D;

    --font: "Inter", system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }

  .wrap { max-width: 1480px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ───── Masthead ───── */
  .masthead { display: flex; flex-direction: column; gap: 4px; margin-bottom: 22px; }
  .masthead h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .masthead h1 .emoji { margin-right: 6px; }
  .masthead .sub { font-size: 13px; color: var(--ink-soft); }
  .masthead .sub strong { color: var(--accent); font-weight: 600; }
  .stale-warn { color: #B91C1C; font-weight: 500; }
  .sync-dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    margin-left: 8px; vertical-align: middle;
    transition: background-color 0.2s ease;
  }
  .sync-synced  { background: #10B981; }   /* green */
  .sync-pending { background: #F59E0B; }   /* amber */
  .sync-failed  { background: #DC2626; }   /* red */
  .sync-offline { background: #9CA3AF; }   /* grey */
  .sync-notice {
    font-size: 12px; color: var(--ink-soft); margin-top: 2px;
  }
  .sync-notice a { color: var(--ink-soft); text-decoration: underline; }
  .token-warn {
    background: #FEF3C7; border: 1px solid #F59E0B; color: #78350F;
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    font-size: 13px; line-height: 1.4;
  }
  .token-warn.expired { background: #FEE2E2; border-color: #DC2626; color: #7F1D1D; }
  .token-warn a { color: inherit; text-decoration: underline; }

  /* ───── Course header cards ───── */
  .course-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .course-card {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 110px;
  }
  .course-card .code {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.01em;
  }
  .course-card .name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    flex: 1;
  }
  .course-card .instructor {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .course-card .links {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }
  .course-card .links a {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    text-decoration: none;
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }
  .course-card .links a:hover { border-color: var(--ink-soft); color: var(--ink); }

  /* ───── Nav row ───── */
  .nav-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .nav-row button {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 12px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .nav-row button:hover:not(:disabled) { border-color: var(--ink); }
  .nav-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-row button.toggle-on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .nav-row .week-label {
    font-weight: 700;
    font-size: 15px;
    padding: 0 6px;
  }
  .nav-row .week-dates {
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 400;
    margin-left: 6px;
  }

  /* ───── Filter chips ───── */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 14px;
  }
  .filter-row .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 6px;
  }
  .chip {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .chip:hover { filter: brightness(0.96); }
  .chip.off { opacity: 0.35; }
  .chip.type-reading { background: var(--type-reading-bg); color: var(--type-reading-fg); border-color: transparent; }
  .chip.type-video { background: var(--type-video-bg); color: var(--type-video-fg); border-color: transparent; }
  .chip.type-lecture { background: var(--type-lecture-bg); color: var(--type-lecture-fg); border-color: transparent; }
  .chip.type-discussion { background: var(--type-discussion-bg); color: var(--type-discussion-fg); border-color: transparent; }
  .chip.type-paper { background: var(--type-paper-bg); color: var(--type-paper-fg); border-color: transparent; }
  .chip.type-assignment { background: var(--type-assignment-bg); color: var(--type-assignment-fg); border-color: transparent; }
  .chip.type-quiz { background: var(--type-quiz-bg); color: var(--type-quiz-fg); border-color: transparent; }
  .chip.type-exam { background: var(--type-exam-bg); color: var(--type-exam-fg); border-color: transparent; }
  .chip.course-chip { border-color: transparent; color: var(--bg); }

  /* ───── Progress ───── */
  .progress-section { margin-bottom: 22px; }
  .progress-section .top-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-section .top-line .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .progress-section .top-line .count {
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .progress-bar {
    height: 6px;
    background: var(--line-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #6366F1, #8B5CF6);
    transition: width 0.4s ease;
  }
  .progress-breakdown {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .progress-breakdown .ico {
    display: inline-block;
    margin-right: 4px;
  }

  /* ───── Course columns ───── */
  .columns {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .col {
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .col-head {
    color: white;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  .col-head .caret {
    display: inline-block;
    width: 12px;
    margin-right: 6px;
    transition: transform 0.15s ease;
    font-size: 11px;
    line-height: 1;
    opacity: 1;
    color: white;
  }
  .col.collapsed .col-head .caret { transform: rotate(-90deg); }
  .col.collapsed .col-body,
  .col.collapsed .col-quiet { display: none; }
  /* When collapsed, the column shrinks to its header — don't let the grid stretch
     it to match its taller neighbours (otherwise a white box hangs below). */
  .col.collapsed {
    align-self: start;
    border-color: transparent;
  }
  .col-head .col-title { font-size: 14px; line-height: 1.2; }
  .col-head .col-code-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    opacity: 0.9;
    margin-left: 8px;
  }
  .col-head .col-progress {
    font-family: var(--font-mono);
    font-size: 11px;
    opacity: 0.95;
    font-weight: 500;
  }
  .col-body { padding: 10px 8px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .col-empty { padding: 24px 8px; text-align: center; color: var(--muted); font-style: italic; font-size: 12.5px; }

  .item {
    display: flex;
    gap: 9px;
    padding: 8px 8px 9px;
    border-radius: 6px;
    transition: background 0.12s ease;
    align-items: flex-start;
  }
  .item:hover { background: var(--line-soft); }
  .item.done .item-title-link { text-decoration: line-through; color: var(--muted); }
  .item.done .item-detail { color: var(--muted); }

  .item input[type=checkbox] {
    margin-top: 3px;
    width: 14px;
    height: 14px;
    accent-color: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 13.5px; font-weight: 600; line-height: 1.3; word-break: break-word; }
  .item-title-link { color: var(--link); text-decoration: none; }
  .item-title-link:hover { text-decoration: underline; }
  .item-detail { font-size: 12px; color: var(--ink-soft); margin-top: 2px; line-height: 1.4; word-break: break-word; }
  .item-summary { font-size: 12.5px; color: var(--ink-soft); font-style: italic; margin-top: 3px; line-height: 1.4; }
  .item.is-overview { background: #FFFBEB; }
  .badge-overview {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    background: #FEF3C7; color: #92400E; border-radius: 4px;
    padding: 1px 6px; margin-left: 6px; vertical-align: middle;
    letter-spacing: 0.02em;
  }
  .item-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
  .item-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .item-due {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ───── All weeks view ───── */
  .all-weeks { display: flex; flex-direction: column; gap: 14px; }
  .week-block {
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
  }
  .week-block.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .week-block-head {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    gap: 14px;
  }
  .week-block-head:hover { background: #F3F4F6; }
  .week-block-head .wn { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .week-block-head h3 { font-size: 16px; font-weight: 700; }
  .week-block-head .dates { font-size: 12.5px; color: var(--ink-soft); font-weight: 400; }
  .week-block-head .badge-now {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: var(--accent);
    color: white;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .week-block-head .counts {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--ink-soft);
  }
  .week-block-head .chevron {
    color: var(--muted);
    transition: transform 0.2s ease;
    display: inline-block;
    margin-left: 6px;
  }
  .week-block.open .chevron { transform: rotate(90deg); }

  .week-block-body { display: none; padding: 12px 16px 16px; }
  .week-block.open .week-block-body { display: block; }
  .week-block-body .columns {
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  /* ───── Undated items section ───── */
  .undated-block {
    margin-top: 24px;
    border: 1px solid #FDE68A;
    border-radius: 8px;
    background: #FFFBEB;
  }
  .undated-block summary {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    list-style: none;
    flex-wrap: wrap;
  }
  .undated-block summary::-webkit-details-marker { display: none; }
  .undated-block summary:hover { background: #FEF3C7; border-radius: 8px; }
  .undated-block[open] summary { border-bottom: 1px solid #FDE68A; border-radius: 8px 8px 0 0; }
  .undated-title {
    font-size: 14px;
    font-weight: 700;
    color: #92400E;
  }
  .undated-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    background: #F59E0B;
    color: white;
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    margin-left: 4px;
  }
  .undated-sub {
    font-size: 12px;
    color: #92400E;
    opacity: 0.75;
    flex: 1;
  }
  .undated-body {
    padding: 14px 16px 16px;
  }
  .undated-note {
    font-size: 12.5px;
    color: #78350F;
    margin-bottom: 14px;
    padding: 8px 12px;
    background: #FEF3C7;
    border-radius: 6px;
    border-left: 3px solid #F59E0B;
  }

  /* ───── Footer ───── */
  footer.foot {
    margin-top: 40px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 11.5px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer.foot a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px dotted var(--muted); }

  /* ───── Loading / errors ───── */
  .loading, .error {
    padding: 80px 40px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .error { color: #B91C1C; }
  .error code {
    display: inline-block;
    background: #FEF2F2;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .hidden { display: none !important; }

  /* ───── Urgency / overdue ───── */
  .item.overdue-item  { border-left: 3px solid #DC2626; margin-left: -3px; border-radius: 0 6px 6px 0; }
  .item.due-soon-item { border-left: 3px solid #F59E0B; margin-left: -3px; border-radius: 0 6px 6px 0; }
  .item-due.due-soon  { color: #B45309; font-weight: 700; }
  .item-due.overdue   { color: #DC2626; font-weight: 700; }

  /* ───── What's Next strip ───── */
  .whats-next {
    margin-bottom: 16px;
    padding: 11px 14px 12px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .whats-next-header {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .next-items { display: flex; flex-direction: column; gap: 5px; }
  .next-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 13px;
    line-height: 1.35;
  }
  .next-item .next-ico   { flex-shrink: 0; font-size: 12px; }
  .next-item .next-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .next-item .next-title a { color: var(--link); text-decoration: none; }
  .next-item .next-title a:hover { text-decoration: underline; }
  .next-item .next-meta  { flex-shrink: 0; font-size: 11.5px; font-family: var(--font-mono); color: var(--muted); white-space: nowrap; }
  .next-item .next-meta.due-soon { color: #B45309; font-weight: 700; }
  .next-item .next-meta.overdue  { color: #DC2626; font-weight: 700; }

  /* ───── Progress pills ───── */
  .prog-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .prog-pill {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 11.5px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .prog-pill-done { background: #D1FAE5; border-color: #6EE7B7; color: #065F46; }
  .prog-celebrate {
    font-size: 15px;
    font-weight: 700;
    color: #065F46;
    text-align: center;
    padding: 6px 0 4px;
  }

  /* ───── Empty course column ───── */
  .col.col-muted .col-head { opacity: 0.55; }
  .col-quiet { padding: 18px 8px; text-align: center; color: var(--muted); font-size: 12px; font-style: italic; }

  /* ───── Note copy button ───── */
  .note-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: inherit;
    font-size: 10.5px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s ease;
    margin-left: 2px;
  }
  .note-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
  .note-btn.copied { border-color: #10B981; color: #065F46; }

  /* ───── Refresh now button ───── */
  .refresh-btn {
    display: inline-flex;
    align-items: center;
    background: none;
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 3px 9px;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-left: 10px;
    vertical-align: middle;
  }
  .refresh-btn:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
  .refresh-btn:disabled { cursor: wait; opacity: 0.65; }
  .refresh-btn.refresh-done { border-color: #10B981; color: #065F46; }
  .refresh-btn.refresh-err  { border-color: #DC2626; color: #991B1B; opacity: 1; cursor: pointer; }

  @media (max-width: 700px) {
    .wrap { padding: 16px 12px 40px; }
    .nav-row .week-label { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="loading">Loading dashboard…</div>
</div>

<script>
// Migrate old GitHub Pages bookmark to custom domain, preserving #t= token.
// Runs before anything else so the redirect is seamless.
if (location.hostname === 'tbfitzsimmons.github.io') {
  location.replace('https://jtbdashboard.fitzsimmons.org/' + location.hash);
}

/* ═══════════════════════════════════════════════════════════════════════════
   DASHBOARD APP
   - Fetches dashboard/data.json (written by sync.py)
   - Renders week / all-weeks views
   - Persists check-off state per item canvas_id in localStorage
   - Auto-detects current week from semester.start_date + today
   - Re-renders at midnight if left open across a day boundary
   ═══════════════════════════════════════════════════════════════════════════ */

const STATE = {
  data: null,
  view: 'week',                     // 'week' | 'all'
  viewedWeek: 1,                    // current week being shown
  typeFilters: new Set(),           // empty = show all
  courseFilters: new Set(),         // empty = show all
};

const TYPE_META = {
  reading:    { ico: '📖', label: 'READING' },
  video:      { ico: '🎬', label: 'VIDEO' },
  lecture:    { ico: '🎤', label: 'LECTURE' },
  discussion: { ico: '💬', label: 'DISCUSSION' },
  paper:      { ico: '📝', label: 'PAPER' },
  assignment: { ico: '📋', label: 'ASSIGNMENT' },
  quiz:       { ico: '🧩', label: 'QUIZ' },
  exam:       { ico: '🎓', label: 'EXAM' },
};
const TYPE_ORDER = ['reading', 'video', 'lecture', 'discussion', 'paper', 'assignment', 'quiz', 'exam'];

const root = document.getElementById('root');

// ───────────────────────────────────────────────────────────── persistence ──
//
// Two-tier state: localStorage (instant, offline-safe) + Cloudflare KV
// (cross-device sync). Token comes from URL fragment #t=<token>. Without a
// token we fall back to localStorage-only and show a notice.

// v2 = per-semester namespacing. Bumping this key forces every device to
// start with an empty local cache so a remote wipe propagates correctly.
const STORAGE_KEY = 'canvas-dashboard.checked-v2';
const SYNC_BASE = 'https://dashboard-sync.brooks-1b9.workers.dev/state';
const TOKEN_STORAGE_KEY = 'canvas-dashboard.sync-token-v1';

// Read the sync token from the URL fragment AND/OR localStorage. Persists
// the token on first sight so the device stays paired even if the bookmark
// later loses the fragment (some apps strip fragments on share, some browsers
// strip them on re-bookmark, copy/paste loses them).
function readSyncToken() {
  // 1. URL fragment — wins. If present, persist for future visits.
  const h = (location.hash || '').replace(/^#/, '');
  const params = new URLSearchParams(h);
  const tFromUrl = params.get('t');
  if (tFromUrl && tFromUrl.length >= 16) {
    try { localStorage.setItem(TOKEN_STORAGE_KEY, tFromUrl); } catch {}
    return tFromUrl;
  }
  // 2. Previously-paired device — fall back to localStorage.
  try {
    const tFromLocal = localStorage.getItem(TOKEN_STORAGE_KEY);
    if (tFromLocal && tFromLocal.length >= 16) return tFromLocal;
  } catch {}
  return null;
}
const SYNC_TOKEN = readSyncToken();

// Clear the paired token on this device (used by the "re-pair" affordance)
function clearSyncToken() {
  try { localStorage.removeItem(TOKEN_STORAGE_KEY); } catch {}
  // Reload onto a clean URL — the user will re-arrive via the proper bookmark
  location.href = location.pathname;
}

// Download a JSON backup of this device's local check-offs. Pure read; never
// mutates anything. Useful before any risky sync operation.
function exportLocalCheckoffs() {
  let arr = [];
  try { arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch {}
  const payload = {
    exported_at: new Date().toISOString(),
    device: navigator.userAgent,
    semester_hint: (window.STATE && STATE.data && STATE.data.semester && STATE.data.semester.name) || null,
    storage_key: STORAGE_KEY,
    count: arr.length,
    items: arr,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `canvas-dashboard-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert(`Backup saved (${arr.length} items). Keep this file until you've verified cross-device sync.`);
}

// Restore a previously-exported backup file. Reads the JSON, unions every ID
// into local check-offs, persists, and (if paired) immediately pushes to KV.
function importLocalCheckoffs() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json';
  inp.onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      const text = await f.text();
      const payload = JSON.parse(text);
      const items = Array.isArray(payload.items) ? payload.items : Array.isArray(payload) ? payload : null;
      if (!items) throw new Error('Backup file format unrecognized');
      let added = 0;
      for (const id of items) {
        if (typeof id === 'string' && !CHECKED.has(id)) { CHECKED.add(id); added++; }
      }
      persistLocal(CHECKED);
      if (SYNC_TOKEN) { SYNC.dirty = true; await flushRemote(); }
      if (typeof render === 'function' && STATE.data) render();
      alert(`Restored ${added} new check-offs (total now ${CHECKED.size}).`);
    } catch (err) {
      alert('Restore failed: ' + err.message);
    }
  };
  inp.click();
}

// ── Refresh state machine ──────────────────────────────────────────────────
// The button calls the canvas-dispatch Cloudflare Worker (no token in URL).
// Legacy fallback: if &gh=<PAT> is still in the URL fragment, use it directly
// until the worker is deployed and the param can be removed from the bookmark.
const DISPATCH_WORKER = 'https://dashboard-sync.brooks-1b9.workers.dev/dispatch';
const GH_REPO = 'tbfitzsimmons/canvas-dashboard';

function readGithubTokenFromHash() {
  const h = (location.hash || '').replace(/^#/, '');
  const t = new URLSearchParams(h).get('gh');
  return t && t.length >= 16 ? t : null;
}
const LEGACY_GH_TOKEN = readGithubTokenFromHash();

const REFRESH = { active: false, startedAt: 0, timer: null };

function setRefreshBtn(cls, label) {
  const btn = document.getElementById('refresh-btn');
  if (!btn) return;
  btn.disabled = cls === 'busy';
  btn.className = 'refresh-btn' + (cls && cls !== 'idle' ? ' refresh-' + cls : '');
  btn.textContent = label;
}

async function triggerRefresh() {
  if (REFRESH.active) return;
  REFRESH.active = true;
  REFRESH.startedAt = Date.now();
  setRefreshBtn('busy', 'Triggering…');
  try {
    let res;
    if (LEGACY_GH_TOKEN) {
      // Legacy: direct GitHub API with PAT still in URL — works until worker is live
      res = await fetch(
        `https://api.github.com/repos/${GH_REPO}/actions/workflows/sync.yml/dispatches`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${LEGACY_GH_TOKEN}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json',
            'X-GitHub-Api-Version': '2022-11-28',
          },
          body: JSON.stringify({ ref: 'main' }),
        }
      );
    } else {
      // Clean path: Cloudflare Worker holds the PAT as a secret
      res = await fetch(DISPATCH_WORKER, { method: 'POST' });
    }
    if (!res.ok) {
      const msg = await res.text().catch(() => '');
      throw new Error(`Dispatch ${res.status}${msg ? ': ' + msg : ''}`);
    }
    pollForFreshData(STATE.data?.generated_at);
  } catch (e) {
    console.error('[refresh]', e);
    const msg = e.message || 'unknown error';
    setRefreshBtn('err', `✗ ${msg.length < 40 ? msg : 'Failed — see console'}`);
    REFRESH.active = false;
  }
}

function pollForFreshData(priorGenerated) {
  const elapsed = () => Math.round((Date.now() - REFRESH.startedAt) / 1000);
  const MAX_WAIT_S = 180;

  function tick() {
    if (elapsed() > MAX_WAIT_S) {
      setRefreshBtn('err', '✗ Timed out — try again');
      REFRESH.active = false;
      return;
    }
    setRefreshBtn('busy', `Syncing… ${elapsed()}s`);
    fetch('data.json?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(fresh => {
        if (fresh.generated_at && fresh.generated_at !== priorGenerated) {
          STATE.data = fresh;
          render();
          setRefreshBtn('done', '✓ Up to date');
          setTimeout(() => { setRefreshBtn('idle', '↻ Refresh now'); REFRESH.active = false; }, 3000);
        } else {
          REFRESH.timer = setTimeout(tick, 5000);
        }
      })
      .catch(() => { REFRESH.timer = setTimeout(tick, 5000); });
  }
  // Give the workflow a few seconds head-start before first poll
  REFRESH.timer = setTimeout(tick, 8000);
}

function loadChecked() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function persistLocal(set) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); } catch {}
}
const CHECKED = loadChecked();

// ── Per-course collapse state (local-only, persisted in localStorage) ──────
const COLLAPSED_KEY = 'canvas-dashboard.collapsed-courses-v1';
function loadCollapsedCourses() {
  try { return new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '[]')); }
  catch { return new Set(); }
}
function persistCollapsedCourses(set) {

}
const COLLAPSED_COURSES = loadCollapsedCourses();

function toggleCourseCollapsed(courseId) {

// ── Sync state machine ─────────────────────────────────────────────────────
//   'synced'  green   — local and remote agree (or no token, localStorage only)
//   'pending' amber   — write in flight or queued
//   'failed'  red     — gave up after retries; will retry on next change
//   'offline' grey    — no token, no sync
const SYNC = {
  status: SYNC_TOKEN ? 'pending' : 'offline',
  dirty: false,
  writeTimer: null,
  retryCount: 0,
};

function setSyncStatus(s) {
  SYNC.status = s;
  const dot = document.getElementById('sync-dot');
  if (dot) {
    dot.className = 'sync-dot sync-' + s;
    dot.title = ({
      synced:  'Check-offs synced across devices',
      pending: 'Saving…',
      failed:  'Sync failed — will retry on next change',
      offline: 'Local only (no sync token in URL)',
    })[s] || s;
  }
}

// Remote blob cached after pull — preserves other semesters' buckets across
// our writes (read-modify-write pattern).
let REMOTE_BLOB = null;

function currentSemesterKey() {
  return (STATE && STATE.data && STATE.data.semester && STATE.data.semester.name) || 'default';
}

// Extract the items-object for the current semester from a remote blob.
// Supports both v2 (semester-scoped) and legacy v1 (flat items at root —
// migrated by treating them as belonging to the current semester).
function extractSemesterItems(blob) {
  if (!blob || typeof blob !== 'object') return {};
  if (blob.semesters && typeof blob.semesters === 'object') {
    return blob.semesters[currentSemesterKey()] || {};
  }
  // Legacy v1: flat items at root → treat as current-semester
  if (blob.items && typeof blob.items === 'object') {
    return blob.items;
  }
  return {};
}

async function pullRemote() {
  if (!SYNC_TOKEN) return;
  try {
    const res = await fetch(SYNC_BASE, {
      cache: 'no-store',
      headers: { 'Authorization': `Bearer ${SYNC_TOKEN}` },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    REMOTE_BLOB = await res.json();
    const remoteItems = extractSemesterItems(REMOTE_BLOB);
    const remoteCount = Object.keys(remoteItems).length;
    const localCount = CHECKED.size;
    // Merge policy:
    //   • If remote has NO entries for this semester, this is a first-pairing
    //     (or KV wipe). Don't clear local — push it UP to seed the bucket.
    //   • Otherwise: union local ∪ remote so a check from any device sticks,
    //     then push the union back so all devices converge.
    // Manual wipes are handled via the explicit unpair/repair affordance, not
    // by trusting an empty remote bucket. This protects against accidental
    // data loss when KV is empty for any reason (server reset, never written).
    let changed = false;
    for (const id of Object.keys(remoteItems)) {
      if (remoteItems[id] && !CHECKED.has(id)) { CHECKED.add(id); changed = true; }
    }
    persistLocal(CHECKED);
    setSyncStatus('synced');
    if (typeof render === 'function' && STATE.data) render();
    // If local has data the remote doesn't, push IMMEDIATELY (no 500ms timer).
    // This is critical on mobile: Safari can suspend a tab before a debounced
    // write fires, losing the push entirely. The boot-time pull is the worst
    // case for that, so we await the flush right here.
    const needPush = (CHECKED.size !== remoteCount) || changed
                  || (localCount > 0 && remoteCount === 0);
    if (needPush) {
      SYNC.dirty = true;
      await flushRemote();
    }
  } catch (e) {
    console.warn('[sync] pull failed:', e);
    setSyncStatus('failed');
  }
}

function scheduleRemoteWrite() {
  if (!SYNC_TOKEN) return;
  SYNC.dirty = true;
  setSyncStatus('pending');
  if (SYNC.writeTimer) clearTimeout(SYNC.writeTimer);
  SYNC.writeTimer = setTimeout(flushRemote, 500);
}

async function flushRemote(attempt = 0) {
  if (!SYNC_TOKEN || !SYNC.dirty) return;
  const snapshot = {};
  for (const id of CHECKED) snapshot[id] = true;

  // Build v2 blob: preserve other semesters' buckets, replace only the current one.
  const existingSemesters = (REMOTE_BLOB && REMOTE_BLOB.semesters && typeof REMOTE_BLOB.semesters === 'object')
    ? { ...REMOTE_BLOB.semesters }
    : {};
  // If we previously pulled a legacy v1 blob, migrate its flat items into the current semester
  // (only when the current semester bucket is otherwise empty, to avoid clobbering).
  if (
    REMOTE_BLOB && REMOTE_BLOB.items && typeof REMOTE_BLOB.items === 'object' &&
    !existingSemesters[currentSemesterKey()]
  ) {
    existingSemesters[currentSemesterKey()] = REMOTE_BLOB.items;
  }
  existingSemesters[currentSemesterKey()] = snapshot;
  // Worker still validates body.items as a sanity check — include it (mirror of current semester).
  const body = {
    v: 2,
    items: snapshot,
    semesters: existingSemesters,
  };

  try {
    const res = await fetch(SYNC_BASE, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SYNC_TOKEN}`,
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    // Update cached blob so subsequent writes preserve cross-semester data correctly
    REMOTE_BLOB = body;
    SYNC.dirty = false;
    SYNC.retryCount = 0;
    setSyncStatus('synced');
  } catch (e) {
    console.warn('[sync] push failed:', e);
    window.__LAST_SYNC_ERROR__ = (e && e.message) ? e.message : String(e);
    if (attempt < 3) {
      const backoff = 1000 * Math.pow(2, attempt); // 1s, 2s, 4s
      setTimeout(() => flushRemote(attempt + 1), backoff);
      setSyncStatus('pending');
    } else {
      setSyncStatus('failed');
    }
  }
}

// Diagnostic helper exposed via the masthead "diag" link — works on mobile
// where dev tools aren't easily accessible. Shows the last sync error.
function showSyncDiagnostics() {
  const lines = [
    `Token (full): ${SYNC_TOKEN || 'NONE'}`,
    `Token length: ${SYNC_TOKEN ? SYNC_TOKEN.length : 0}`,
    `Local items: ${CHECKED.size}`,
    `Remote items (last pull): ${REMOTE_BLOB ? Object.keys(extractSemesterItems(REMOTE_BLOB)).length : 'never pulled'}`,
    `Sync status: ${SYNC.status}`,
    `Last error: ${window.__LAST_SYNC_ERROR__ || '(none)'}`,
    `Worker URL: ${SYNC_BASE}`,

// Flush queued writes when network comes back
window.addEventListener('online', () => { if (SYNC.dirty) flushRemote(); });
// Pull fresh check-off state when tab refocuses (another device may have updated)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && SYNC_TOKEN && !SYNC.dirty) pullRemote();
});
// And poll while the tab is visible — catches cross-device changes within 30s
// even if the user doesn't switch tabs/apps.
setInterval(() => {
  if (!document.hidden && SYNC_TOKEN && !SYNC.dirty) pullRemote();
}, 30000);
// Re-fetch data.json when tab refocuses — picks up any sync that ran while away
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && STATE.data && !REFRESH.active) {
    fetch('data.json?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(fresh => {
        if (fresh.generated_at && fresh.generated_at !== STATE.data.generated_at) {
          STATE.data = fresh;
          render();
        }
      })
      .catch(() => {});
  }
});

// ─────────────────────────────────────────────────────────────── date math ──

function parseDate(s) { return s ? new Date(s) : null; }

function startOfWeek1() {
  return parseDate(STATE.data.semester.start_date + 'T00:00:00');
}

function currentWeekNumber() {
  const start = startOfWeek1();
  const today = new Date();
  const days = Math.floor((today - start) / 86400000);
  if (days < 0) return 1;
  const wk = Math.floor(days / 7) + 1;
  return Math.min(Math.max(wk, 1), STATE.data.semester.weeks);
}

function weekDateRange(weekNum) {
  const start = startOfWeek1();
  const ws = new Date(start);
  ws.setDate(ws.getDate() + (weekNum - 1) * 7);
  const we = new Date(ws);
  we.setDate(we.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${fmt(ws)} – ${fmt(we)}`;
}

function formatRefreshTime(iso) {
  const d = parseDate(iso);
  if (!d) return '—';
  return d.toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
    timeZoneName: 'short',
  });
}

function hoursSince(iso) {
  return (new Date() - parseDate(iso)) / 3600000;
}

// ───────────────────────────────────────────────────────────────── filtering ──

function filteredItems() {
  return STATE.data.items.filter(it => {
    if (STATE.typeFilters.size && !STATE.typeFilters.has(it.type)) return false;
    if (STATE.courseFilters.size && !STATE.courseFilters.has(it.courseId)) return false;
    return true;
  });
}

function itemsForWeek(weekNum) {
  return filteredItems().filter(it => it.week === weekNum);
}

// ───────────────────────────────────────────────────────────── urgency math ──

function dueTimestamp(it) {
  if (!it.due_date) return null;
  return new Date(it.due_date + 'T23:59:59').getTime();
}
function isOverdue(it) {
  const ts = dueTimestamp(it);
  return ts !== null && ts < Date.now() && !CHECKED.has(it.canvas_id);
}
function isDueSoon(it) {
  const ts = dueTimestamp(it);
  if (ts === null || CHECKED.has(it.canvas_id) || ts < Date.now()) return false;
  return (ts - Date.now()) / 3_600_000 <= 48;
}

// ─────────────────────────────────────────────── What's Next data + render ──

function whatsnextItems() {
  return STATE.data.items
    .filter(it => !CHECKED.has(it.canvas_id) && it.due_date)
    .sort((a, b) => (a.due_date > b.due_date ? 1 : a.due_date < b.due_date ? -1 : 0))
    .slice(0, 3);
}

function renderWhatsnext() {
  const items = whatsnextItems();
  if (!items.length) return '';
  const rows = items.map(it => {
    const course = STATE.data.courses.find(c => c.id === it.courseId);
    const t = TYPE_META[it.type] || { ico: '•' };
    const overdue = isOverdue(it);
    const soon    = !overdue && isDueSoon(it);
    const urgCls  = overdue ? 'overdue' : soon ? 'due-soon' : '';
    const dueFmt  = it.due_date
      ? new Date(it.due_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      : (it.due || '—');
    const dueLbl  = overdue ? `overdue · ${dueFmt}` : dueFmt;
    const titleHtml = it.link
      ? `<a href="${escapeAttr(it.link)}" target="_blank">${escapeHtml(it.title)}</a>`
      : escapeHtml(it.title);
    return `
      <div class="next-item">
        <span class="next-ico">${t.ico}</span>
        <span class="next-title">${titleHtml}</span>
        <span class="next-meta ${urgCls}">${course ? escapeHtml(course.code) : ''} · ${dueLbl}</span>
      </div>`;
  }).join('');
  return `
    <div class="whats-next" id="whats-next">
      <div class="whats-next-header">Up next</div>
      <div class="next-items">${rows}</div>
    </div>`;
}

// ──────────────────────────────────────────── Granola-style note clipboard ──

function copyItemNote(canvasId) {
  const it = STATE.data.items.find(i => i.canvas_id === canvasId);
  if (!it) return;
  const course = STATE.data.courses.find(c => c.id === it.courseId);
  const t = TYPE_META[it.type] || { ico: '•', label: it.type };
  const lines = [
    `${t.ico} ${it.title}`,
    `Course:  ${course ? course.name + (course.code ? ` (${course.code})` : '') : '—'}`,
    `Due:     ${it.due || '—'}`,
    it.link ? `Link:    ${it.link}` : '',
    '',
    '---',
    '',
  ].filter((l, i, a) => l !== '' || (i > 0 && a[i - 1] !== ''));
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.querySelector(`.note-btn[data-note="${CSS.escape(canvasId)}"]`);
    if (!btn) return;
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Note'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {});
}

// ─────────────────────────────────────────────────────────────── rendering ──

function renderTokenWarning(expiresStr) {
  if (!expiresStr) return '';
  const exp = new Date(expiresStr + 'T00:00:00');
  if (isNaN(exp)) return '';
  const days = Math.ceil((exp - Date.now()) / 86400000);
  if (days > 14) return '';
  const tokensUrl = 'https://naropa.instructure.com/profile/settings';
  const niceDate = exp.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  const expired = days < 0;
  const msg = expired
    ? `⚠ Canvas token <strong>expired ${niceDate}</strong> — sync is broken until you regenerate it`
    : `⚠ Canvas token expires <strong>${niceDate}</strong> (${days === 0 ? 'today' : days + ' day' + (days === 1 ? '' : 's')}) — regenerate soon`;
  return `<div class="token-warn${expired ? ' expired' : ''}">${msg} at <a href="${tokensUrl}" target="_blank">Canvas → Settings → Approved Integrations</a>.</div>`;
}

function render() {
  const d = STATE.data;
  const generated = formatRefreshTime(d.generated_at);
  const stale = hoursSince(d.generated_at) > 48; // warn if >2 days old

  root.innerHTML = `
    ${renderTokenWarning(d.token_expires)}
    <div class="masthead">
      <h1>
        <span class="emoji">🎓</span>${escapeHtml(d.semester.name)} Semester Dashboard
        <span id="sync-dot" class="sync-dot sync-${SYNC.status}" title=""></span>
      </h1>
      <div class="sub">
        Last refreshed: <strong>${generated}</strong>
        ${stale ? '&nbsp;<span class="stale-warn">⚠ data is more than 2 days old</span>' : ''}
        <button id="refresh-btn" class="refresh-btn" onclick="triggerRefresh()">↻ Refresh now</button>
      </div>
      ${SYNC_TOKEN
        ? `<div class="sync-notice" style="font-size:11px;">Paired for cross-device sync · <a href="#" onclick="event.preventDefault(); exportLocalCheckoffs();">📥 backup</a> · <a href="#" onclick="event.preventDefault(); if(confirm('Unpair this device? You\\'ll need the bookmark URL to re-pair.')) clearSyncToken();">unpair this device</a></div>`
        : `<div class="sync-notice">⚠ This device isn't paired. Check-offs save only locally. Open Jennifer's bookmark URL once to pair this device.</div>`}
    </div>

    ${renderCourseStrip()}

    <div class="nav-row" id="nav-row"></div>

    <div class="filter-row" id="type-filter"></div>
    <div class="filter-row" id="course-filter"></div>

    ${renderProgressSection()}

    <div id="view-container"></div>

    <footer class="foot">
      <div>Auto-syncs every Monday at 00:00 MDT · Check-offs save in this browser</div>
      <div><a href="https://github.com/${repoSlug()}/actions/workflows/sync.yml" target="_blank">View sync history ↗</a></div>
    </footer>
  `;

  renderNavRow();
  renderTypeFilter();
  renderCourseFilter();
  renderView();
  setSyncStatus(SYNC.status); // refresh tooltip after re-render
}

function renderCourseStrip() {
  return `<div class="course-strip">${
    STATE.data.courses.map(c => `
      <div class="course-card" style="border-top: 3px solid ${c.color_bar};">
        <div class="code" style="color: ${c.color_bar};">${escapeHtml(c.code)}</div>
        <div class="name">${escapeHtml(c.name)}</div>
        <div class="instructor">${escapeHtml(c.instructor || '—')}</div>
        <div class="links">
          <a href="${escapeAttr(c.canvas_url)}" target="_blank">Canvas ↗</a>
          ${c.zoom_url ? `<a href="${escapeAttr(c.zoom_url)}" target="_blank">Zoom ↗</a>` : ''}
        </div>
      </div>
    `).join('')
  }</div>`;
}

function renderNavRow() {
  const cur = currentWeekNumber();
  const el = document.getElementById('nav-row');
  if (STATE.view === 'week') {
    el.innerHTML = `
      <button id="prev-week" ${STATE.viewedWeek <= 1 ? 'disabled' : ''}>← Prev</button>
      <span class="week-label">Week ${STATE.viewedWeek}<span class="week-dates">${weekDateRange(STATE.viewedWeek)}</span></span>
      <button id="next-week" ${STATE.viewedWeek >= STATE.data.semester.weeks ? 'disabled' : ''}>Next →</button>
      <button id="jump-current" ${STATE.viewedWeek === cur ? 'disabled' : ''}>Jump to current week (${cur})</button>
      <span style="flex:1"></span>
      <button class="toggle-on">Week View</button>
      <button id="goto-all">All Weeks</button>
    `;
    document.getElementById('prev-week').onclick = () => { STATE.viewedWeek--; renderNavRow(); renderView(); renderProgressSection_update(); };
    document.getElementById('next-week').onclick = () => { STATE.viewedWeek++; renderNavRow(); renderView(); renderProgressSection_update(); };
    document.getElementById('jump-current').onclick = () => { STATE.viewedWeek = cur; renderNavRow(); renderView(); renderProgressSection_update(); };
    document.getElementById('goto-all').onclick = () => { STATE.view = 'all'; renderNavRow(); renderView(); renderProgressSection_update(); };
  } else {
    el.innerHTML = `
      <span class="week-label">All Weeks</span>
      <span style="flex:1"></span>
      <button id="goto-week">Week View</button>
      <button class="toggle-on">All Weeks</button>
    `;
    document.getElementById('goto-week').onclick = () => { STATE.view = 'week'; renderNavRow(); renderView(); renderProgressSection_update(); };
  }
}

function renderTypeFilter() {
  const el = document.getElementById('type-filter');
  el.innerHTML = `<span class="label">Type:</span>` + TYPE_ORDER.map(t => {
    const off = STATE.typeFilters.size > 0 && !STATE.typeFilters.has(t);
    return `<button class="chip type-${t} ${off ? 'off' : ''}" data-type="${t}">
      ${TYPE_META[t].ico} ${TYPE_META[t].label.toLowerCase()}
    </button>`;
  }).join('');
  el.querySelectorAll('[data-type]').forEach(btn => {
    btn.onclick = () => {
      const t = btn.dataset.type;
      if (STATE.typeFilters.has(t)) STATE.typeFilters.delete(t);
      else STATE.typeFilters.add(t);
      // If all filters on, treat as none
      if (STATE.typeFilters.size === TYPE_ORDER.length) STATE.typeFilters.clear();
      renderTypeFilter();
      renderProgressSection_update();
      renderView();
    };
  });
}

function renderCourseFilter() {
  const el = document.getElementById('course-filter');
  el.innerHTML = `<span class="label">Course:</span>` + STATE.data.courses.map(c => {
    const off = STATE.courseFilters.size > 0 && !STATE.courseFilters.has(c.id);
    return `<button class="chip course-chip ${off ? 'off' : ''}" data-course="${c.id}"
              style="background:${c.color_bar};color:white;">
      ${escapeHtml(c.code)}
    </button>`;
  }).join('');
  el.querySelectorAll('[data-course]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.course;
      if (STATE.courseFilters.has(id)) STATE.courseFilters.delete(id);
      else STATE.courseFilters.add(id);
      if (STATE.courseFilters.size === STATE.data.courses.length) STATE.courseFilters.clear();
      renderCourseFilter();
      renderProgressSection_update();
      renderView();
    };
  });
}

function renderProgressSection() {
  const inWeekView = STATE.view === 'week';
  const items = inWeekView ? itemsForWeek(STATE.viewedWeek) : filteredItems();
  const total = items.length;
  const done  = items.filter(it => CHECKED.has(it.canvas_id)).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  const allDone = total > 0 && done === total;
  const label = inWeekView ? `Week ${STATE.viewedWeek}` : 'Semester';

  const pills = TYPE_ORDER.map(t => {
    const ts = items.filter(it => it.type === t);
    if (!ts.length) return '';
    const td = ts.filter(it => CHECKED.has(it.canvas_id)).length;
    const cls = td === ts.length ? ' prog-pill-done' : '';
    return `<span class="prog-pill${cls}">${TYPE_META[t].ico} ${td}/${ts.length}</span>`;
  }).filter(Boolean).join('');

  if (allDone) {
    return `
      <div class="progress-section" id="progress-section">
        <div class="prog-celebrate">🎉 All done ${inWeekView ? 'this week' : 'for the semester'}!</div>
        <div class="prog-pills">${pills}</div>
      </div>`;
  }
  return `
    <div class="progress-section" id="progress-section">
      <div class="top-line">
        <span class="label">${label} — ${done}/${total}</span>
        <span class="count">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width: ${pct}%"></div></div>
      <div class="prog-pills">${pills}</div>
    </div>`;
}

function renderProgressSection_update() {
  const el = document.getElementById('progress-section');
  if (el) el.outerHTML = renderProgressSection();
}

function filteredUndatedItems() {
  return STATE.data.items.filter(it => {
    if (it.week !== 0) return false;
    if (STATE.typeFilters.size > 0 && !STATE.typeFilters.has(it.type)) return false;
    if (STATE.courseFilters.size > 0 && !STATE.courseFilters.has(it.courseId)) return false;
    return true;
  });
}

function renderUndatedSection() {
  const items = filteredUndatedItems();
  if (!items.length) return '';
  const done = items.filter(it => CHECKED.has(it.canvas_id)).length;
  const courses = STATE.data.courses.filter(c =>
    STATE.courseFilters.size === 0 || STATE.courseFilters.has(c.id)
  );
  const cols = courses.map(course => {
    const courseItems = items.filter(it => it.courseId === course.id);
    if (!courseItems.length) return '';
    const cdone = courseItems.filter(it => CHECKED.has(it.canvas_id)).length;
    const isCollapsed = COLLAPSED_COURSES.has(course.id);
    return `
      <div class="col ${isCollapsed ? 'collapsed' : ''}">
        <div class="col-head" style="background:${course.color_bar};" onclick="toggleCourseCollapsed('${escapeAttr(course.id)}')">
          <div><span class="caret">▼</span><span class="col-title">${escapeHtml(course.name)}</span>
               <span class="col-code-tag">${escapeHtml(course.code)}</span></div>
          <div class="col-progress">${cdone}/${courseItems.length}</div>
        </div>
        <div class="col-body">${courseItems.map(renderItem).join('')}</div>
      </div>`;
  }).join('');
  return `
    <details class="undated-block">
      <summary>
        <span class="undated-title">⚠ No Due Date <span class="undated-badge">${items.length}</span></span>
        <span class="undated-sub">${done}/${items.length} done · These items exist in Canvas but have no due date assigned</span>
      </summary>
      <div class="undated-body">
        <p class="undated-note">Canvas contains these items but no professor has set a due date. They still need your attention — check Canvas or ask when they're due.</p>
        <div class="columns">${cols}</div>
      </div>
    </details>`;
}

function renderView() {
  const container = document.getElementById('view-container');
  if (STATE.view === 'week') {
    container.innerHTML = renderWeekColumns(STATE.viewedWeek) + renderUndatedSection();
  } else {
    container.innerHTML = renderAllWeeks() + renderUndatedSection();
  }
  wireCheckboxes();
  wireNoteButtons();
  wireAccordions();
}

function renderWeekColumns(weekNum) {
  const items = itemsForWeek(weekNum);
  const courses = STATE.data.courses;

  if (!items.length) {
    return `<div class="col-empty" style="margin: 40px 0;">No items in Week ${weekNum} match your filters.</div>`;
  }

  // Only show empty-state columns when no course filter is active
  // (if a course is filtered out deliberately, don't pad with ghost columns)
  const showEmpty = STATE.courseFilters.size === 0;

  return `<div class="columns">${
    courses.map(course => {
      const courseItems = items.filter(it => it.courseId === course.id)
        .slice()
        .sort((a, b) => (b.is_overview ? 1 : 0) - (a.is_overview ? 1 : 0));

      const isCollapsed = COLLAPSED_COURSES.has(course.id);

      if (!courseItems.length) {
        if (!showEmpty) return '';
        return `
          <div class="col col-muted ${isCollapsed ? 'collapsed' : ''}">
            <div class="col-head" style="background:${course.color_bar};" onclick="toggleCourseCollapsed('${escapeAttr(course.id)}')">
              <div><span class="caret">▼</span><span class="col-title">${escapeHtml(course.name)}</span>
                   <span class="col-code-tag">${escapeHtml(course.code)}</span></div>
            </div>
            <div class="col-quiet">Nothing assigned this week ✓</div>
          </div>`;
      }

      const done = courseItems.filter(it => CHECKED.has(it.canvas_id)).length;
      return `
        <div class="col ${isCollapsed ? 'collapsed' : ''}">
          <div class="col-head" style="background:${course.color_bar};" onclick="toggleCourseCollapsed('${escapeAttr(course.id)}')">
            <div><span class="caret">▼</span><span class="col-title">${escapeHtml(course.name)}</span>
                 <span class="col-code-tag">${escapeHtml(course.code)}</span></div>
            <div class="col-progress">${done}/${courseItems.length}</div>
          </div>
          <div class="col-body">${courseItems.map(renderItem).join('')}</div>
        </div>`;
    }).join('')
  }</div>`;
}

function renderAllWeeks() {
  const cur = currentWeekNumber();
  const weeks = STATE.data.semester.weeks;
  return `<div class="all-weeks">${
    Array.from({length: weeks}, (_, i) => i + 1).map(wn => {
      const items = itemsForWeek(wn);
      const done = items.filter(it => CHECKED.has(it.canvas_id)).length;
      const isCurrent = wn === cur;
      return `
        <div class="week-block ${isCurrent ? 'current open' : ''}" data-week="${wn}">
          <div class="week-block-head">
            <div class="wn">
              <h3>Week ${wn}</h3>
              <span class="dates">${weekDateRange(wn)}</span>
              ${isCurrent ? '<span class="badge-now">current</span>' : ''}
            </div>
            <div>
              <span class="counts">${done}/${items.length}</span>
              <span class="chevron">▸</span>
            </div>
          </div>
          <div class="week-block-body">
            ${items.length ? renderWeekColumns(wn) : '<div class="col-empty">No items this week.</div>'}
          </div>
        </div>
      `;
    }).join('')
  }</div>`;
}

function renderItem(it) {
  const isDone   = CHECKED.has(it.canvas_id);
  const overdue  = !isDone && isOverdue(it);
  const soon     = !isDone && !overdue && isDueSoon(it);
  const urgClass = overdue ? 'overdue-item' : soon ? 'due-soon-item' : '';
  const dueClass = overdue ? 'overdue' : soon ? 'due-soon' : '';
  const duePfx   = overdue ? '⚠ overdue · ' : '';

  const t = TYPE_META[it.type] || { ico: '•', label: it.type.toUpperCase() };

  const overviewBadge = it.is_overview
    ? `<span class="badge-overview">📌 Overview</span>` : '';
  const overviewSummary = (it.is_overview && it.summary)
    ? `<div class="item-summary">${escapeHtml(it.summary)}</div>` : '';

  // Note button for video + lecture items (copies a Granola-ready template)
  const noteBtn = (it.type === 'video' || it.type === 'lecture')
    ? `<button class="note-btn" data-note="${escapeAttr(it.canvas_id)}">📋 Note</button>`
    : '';

  return `
    <div class="item ${isDone ? 'done' : ''} ${it.is_overview ? 'is-overview' : ''} ${urgClass}" data-id="${escapeAttr(it.canvas_id)}">
      <input type="checkbox" ${isDone ? 'checked' : ''} />
      <div class="item-body">
        <div class="item-title">
          ${it.link
            ? `<a class="item-title-link" href="${escapeAttr(it.link)}" target="_blank">${escapeHtml(it.title)}</a>`
            : escapeHtml(it.title)}
          ${overviewBadge}
        </div>
        ${overviewSummary}
        ${it.detail ? `<div class="item-detail">${escapeHtml(it.detail)}</div>` : ''}
        <div class="item-meta">
          <span class="item-type" style="background:var(--type-${it.type}-bg);color:var(--type-${it.type}-fg);">
            ${t.ico} ${t.label}
          </span>
          <span class="item-due ${dueClass}">${duePfx}due ${escapeHtml(it.due)}</span>
          ${noteBtn}
        </div>
      </div>
    </div>`;
}

function wireCheckboxes() {
  document.querySelectorAll('.item input[type=checkbox]').forEach(box => {
    box.onchange = (e) => {
      const id = e.target.closest('.item').dataset.id;
      if (e.target.checked) CHECKED.add(id); else CHECKED.delete(id);
      saveChecked(CHECKED);
      // Update row appearance + column count without full re-render
      e.target.closest('.item').classList.toggle('done', e.target.checked);
      renderProgressSection_update();
      // Update column count
      const col = e.target.closest('.col');
      if (col) updateColProgress(col);
    };
  });
}

function updateColProgress(colEl) {
  const items = colEl.querySelectorAll('.item');
  const done = colEl.querySelectorAll('.item input:checked').length;
  const progEl = colEl.querySelector('.col-progress');
  if (progEl) progEl.textContent = `${done}/${items.length}`;
}

function wireAccordions() {
  document.querySelectorAll('.week-block-head').forEach(head => {
    head.onclick = () => head.parentElement.classList.toggle('open');
  });
}

function wireNoteButtons() {
  document.querySelectorAll('.note-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      copyItemNote(btn.dataset.note);
    };
  });
}

// ─────────────────────────────────────────────────────────────────── utils ──

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

function repoSlug() {
  return GH_REPO;
}

// ─────────────────────────────────────────────────────────────── boot ──

async function boot() {
  try {
    // Cache-bust so we always see the latest committed data.json
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`Couldn't load data.json (HTTP ${res.status})`);
    STATE.data = await res.json();
    STATE.viewedWeek = currentWeekNumber();
    render();

    // Pull remote check-off state and re-render if it added anything
    pullRemote();

    // Re-render every 5 minutes so the "current week" rolls over automatically.
    setInterval(() => {
      const newCur = currentWeekNumber();
      if (STATE.view === 'week' && STATE.viewedWeek !== newCur) {
        // Only auto-jump if we're not the user has navigated elsewhere; safest
        // is to leave them where they are. Just re-render nav so the
        // "Jump to current week" button updates.
        renderNavRow();
      }
    }, 5 * 60 * 1000);

  } catch (e) {
    root.innerHTML = `
      <div class="error">
        <h2 style="margin-bottom:12px;">Couldn't load dashboard data</h2>
        <p>${escapeHtml(e.message)}</p>
        <p style="margin-top:14px;">
          If this is the first run: go to the
          <a href="https://github.com/${repoSlug()}/actions/workflows/sync.yml" target="_blank" style="color:var(--link)">Actions tab</a>
          and click <strong>Run workflow</strong> to generate <code>data.json</code>.
        </p>
      </div>
    `;
  }
}

boot();
</script>
</body>
</html>
